<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursive Echo - Layer Visualization</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #000;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .control-btn {
      background: #333;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .control-btn:hover:not(:disabled) {
      background: #555;
    }
    .control-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .control-btn.active {
      background: #000;
    }
    .control-btn.secondary {
      background: #777;
      font-size: 11px;
      padding: 8px 14px;
    }
    .control-btn.secondary:hover:not(:disabled) {
      background: #888;
    }
    .btn-group {
      display: flex;
      gap: 4px;
    }
    .btn-group .control-btn {
      flex: 1;
    }
    #render-progress {
      display: none;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }
    #canvas-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    canvas {
      display: block;
      box-shadow: 0 2px 20px rgba(0,0,0,0.15);
      aspect-ratio: 1 / 1;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BP7Srhi_.js"></script>
</head>
<body>
  <div id="controls">
    <div class="btn-group">
      <button id="view-combined-btn" class="control-btn active">Combined</button>
      <button id="view-separated-btn" class="control-btn">Layers</button>
    </div>
    <button id="save-png-btn" class="control-btn secondary">Save Preview</button>
    <button id="export-combined-btn" class="control-btn secondary">Export 30cm Combined</button>
    <button id="export-layers-btn" class="control-btn secondary">Export 30cm Layers</button>
    <div id="render-progress"></div>
  </div>
  <div id="canvas-container"></div>
</body>
</html>
